name: CI Validation Pipeline

on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["*"]

jobs:
  # Backend Verification
  backend-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18.x
          cache: 'npm'
          cache-dependency-path: './backend/package-lock.json'
          
      - name: Install dependencies
        run: npm install
        
      - name: Lint Backend
        run: npm run lint --if-present
        
      - name: Build Backend (Verify)
        run: npm run build --if-present
        
      - name: Run Backend Tests
        run: npm test
        
      - name: Security Audit
        run: npm audit --audit-level=high || echo "Vulnerabilities found, but continuing CI"

  # Frontend Verification
  frontend-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18.x
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'
          
      - name: Install dependencies
        run: npm install
        
      - name: Lint Frontend
        run: npm run lint
        
      - name: Build Frontend
        run: npm run build

  # Docker Infrastructure Verification
  docker-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
        
      - name: Verify Backend Dockerfile
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          
      - name: Verify Frontend Dockerfile
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false

  # Final Success Gate
  ci-success:
    needs: [backend-ci, frontend-ci, docker-ci]
    runs-on: ubuntu-latest
    steps:
      - name: CI Passed
        run: echo "✅ All CI checks passed successfully!"
