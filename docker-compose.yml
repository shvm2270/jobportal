services:
  mongo:
    image: mongo
    container_name: mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  backend:
    build: ./backend
    container_name: backend
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - MONGO_URI=mongodb://mongo:27017/jobportal
      - SECRET_KEY=shivam2270
      - CLOUD_NAME=dqxevwcnw
      - API_KEY=499678813237232
      - API_SECRET=GWly8QmkvZiv8-B0qaIVapb5ApY
      - NODE_ENV=production
      - CLIENT_URL=http://localhost:5173
    depends_on:
      - mongo

  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://backend:3000
    depends_on:
      - backend

volumes:
  mongo-data: